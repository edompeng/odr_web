name: Deploy GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  EMSDK_VERSION: latest

jobs:
  build:
    name: Build Pages artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Emscripten SDK
        run: |
          git clone https://github.com/emscripten-core/emsdk.git "$RUNNER_TEMP/emsdk"
          "$RUNNER_TEMP/emsdk/emsdk" install "$EMSDK_VERSION"
          "$RUNNER_TEMP/emsdk/emsdk" activate "$EMSDK_VERSION"
          echo "$RUNNER_TEMP/emsdk" >> "$GITHUB_PATH"
          echo "$RUNNER_TEMP/emsdk/upstream/emscripten" >> "$GITHUB_PATH"

      - name: Build native test target
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel
          ctest --test-dir build --output-on-failure

      - name: Run JavaScript tests
        run: npm test

      - name: Build WASM static site
        run: npm run build:wasm

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
