name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

env:
  EMSDK_VERSION: latest

jobs:
  native:
    name: Native build and tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build C++
        run: cmake --build build --parallel

      - name: Run C++ tests
        run: ctest --test-dir build --output-on-failure

      - name: Run JavaScript tests
        run: npm test

      - name: Build static fallback artifact
        run: npm run build

  wasm:
    name: WASM build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Emscripten SDK
        run: |
          git clone https://github.com/emscripten-core/emsdk.git "$RUNNER_TEMP/emsdk"
          "$RUNNER_TEMP/emsdk/emsdk" install "$EMSDK_VERSION"
          "$RUNNER_TEMP/emsdk/emsdk" activate "$EMSDK_VERSION"
          echo "$RUNNER_TEMP/emsdk" >> "$GITHUB_PATH"
          echo "$RUNNER_TEMP/emsdk/upstream/emscripten" >> "$GITHUB_PATH"

      - name: Build WASM static artifact
        run: npm run build:wasm

      - name: Verify WASM artifact
        run: |
          test -s dist/index.html
          test -s dist/wasm/opendrive_wasm.js
          test -s dist/wasm/opendrive_wasm.wasm
